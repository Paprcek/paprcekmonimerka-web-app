{% extends "base.html" %}

{% block title %}{{ g.T['gdpr_title'] }}{% endblock %}

{% block content %}
<div class="bg-gray-800 p-8 rounded-xl shadow-2xl transition duration-300 hover:shadow-3xl max-w-3xl mx-auto border border-gray-700">
    
    <h1 class="text-4xl font-bold text-green-500 mb-8 border-b-4 border-green-700 pb-3 text-center">{{ g.T['gdpr_title'] }}</h1>
    
    <div class="space-y-6 text-gray-300 leading-relaxed">
        <p class="text-lg">
            {{ g.T['gdpr_text_01'] }}
        </p>
        <p>{{ g.T['gdpr_text_02'] }}
        </p>
        <p>{{ g.T['gdpr_text_03'] }}
        </p>
    </div>

    <div class="mt-8 pt-6 border-t border-gray-700">
        <h2 class="text-2xl font-bold text-cyan-400 mb-4">{{ g.T['gdpr_cookies_title'] }}</h2>
        <p class="text-gray-300 leading-relaxed italic">
            {{ g.T['gdpr_cookies_text'] }}
        </p>
    </div>
</div>
{% endblock %}
